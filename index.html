      * {

        box-sizing: border-box;
      }
      body {

      }
      h1,
      h2,
      h3,

      }
      /* custom olive green theme */
      .bg-olive-light {
        background-color: #f4f7ec;
      }
      .bg-olive-deep {
        background-color: #2c3e1f;
      }
      .text-olive {
        color: #2c3e1f;
      }
      .border-olive {
        border-color: #4b6b2d;
      }
      .hover\:shadow-olive:hover {
        box-shadow: 0 20px 25px -12px rgba(60, 80, 30, 0.25);
      }
      /* card scale up/down transition */
      .menu-card {
        transition:
          transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1),
          box-shadow 0.3s ease;
      }
      .menu-card:hover {
        transform: scale(1.03) translateY(-6px);
        box-shadow: 0 25px 30px -12px rgba(0, 0, 0, 0.25);
      }
      /* hero random background - will be set via JS */
      .hero-overlay {
        background: linear-gradient(
          135deg,
          rgba(44, 62, 31, 0.82) 0%,
          rgba(30, 45, 20, 0.7) 100%
        );
      }
      /* custom scroll */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #e9f0e0;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b6b2d;
        border-radius: 20px;
      }
